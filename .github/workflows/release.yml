name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (client + server + electron)
        run: npx tsx script/build-electron.ts

      # Linux: install rpmbuild for broader packaging support
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      # Package with optional code signing.
      # CSC_LINK / CSC_KEY_PASSWORD are only passed when the secrets are non-empty.
      # electron-builder treats an empty CSC_LINK as a file path and fails.
      - name: Package Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Windows code signing (optional)
          if [ -n "${{ secrets.WIN_CERT_P12_BASE64 }}" ] && [ "${{ matrix.platform }}" = "win" ]; then
            export CSC_LINK="${{ secrets.WIN_CERT_P12_BASE64 }}"
            export CSC_KEY_PASSWORD="${{ secrets.WIN_CERT_PASSWORD }}"
          fi
          # macOS code signing (optional)
          if [ -n "${{ secrets.MAC_CERT_P12_BASE64 }}" ] && [ "${{ matrix.platform }}" = "mac" ]; then
            export CSC_LINK="${{ secrets.MAC_CERT_P12_BASE64 }}"
            export CSC_KEY_PASSWORD="${{ secrets.MAC_CERT_PASSWORD }}"
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          npx electron-builder --config electron-builder.yml --${{ matrix.platform }} --publish always
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cortex-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.yaml
            release/*.blockmap
          if-no-files-found: warn
