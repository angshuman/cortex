<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Brain icon - simplified geometric -->
  <g transform="translate(256, 256) scale(0.35)" fill="none" stroke="url(#teal)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-60,-160 C-160,-160 -200,-80 -200,0 C-200,80 -160,160 -60,160"/>
    <path d="M-60,-160 C-60,-100 -100,-60 -140,0 C-100,60 -60,100 -60,160"/>
    <!-- Right hemisphere -->
    <path d="M60,-160 C160,-160 200,-80 200,0 C200,80 160,160 60,160"/>
    <path d="M60,-160 C60,-100 100,-60 140,0 C100,60 60,100 60,160"/>
    <!-- Center bridge -->
    <line x1="-60" y1="-80" x2="60" y2="-80"/>
    <line x1="-60" y1="0" x2="60" y2="0"/>
    <line x1="-60" y1="80" x2="60" y2="80"/>
    <!-- Stem -->
    <line x1="0" y1="160" x2="0" y2="220"/>
  </g>
</svg>
